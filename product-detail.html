<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - THAI LOCK</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --tl-ink: #0f172a;
    --tl-navy: #102a63;
    --tl-blue: #2563eb;
    --tl-blue-soft: #60a5fa;
    --tl-dark: #071426;
    --tl-white: #ffffff;
}

html {
    scroll-behavior: smooth;
}

body {
    overflow-x: hidden;
    min-height: 100vh;
    background:
        radial-gradient(circle at 12% 18%, rgba(37,99,235,.30), transparent 32%),
        radial-gradient(circle at 88% 8%, rgba(96,165,250,.18), transparent 30%),
        radial-gradient(circle at 78% 92%, rgba(37,99,235,.14), transparent 35%),
        linear-gradient(180deg, #06101f 0%, #071426 48%, #0b1830 100%);
    color: #ffffff;
    font-family: 'Inter', Arial, sans-serif;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.028) 1px, transparent 1px);
    background-size: 72px 72px;
    opacity: .32;
}

.back-btn {
    position: fixed;
    top: 28px;
    left: 28px;
    z-index: 1000;
    padding: 12px 22px;
    border-radius: 999px;
    background: rgba(255,255,255,.10);
    border: 1px solid rgba(255,255,255,.18);
    color: #ffffff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 800;
    box-shadow: 0 18px 45px rgba(0,0,0,.24);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: .3s ease;
}

.back-btn:hover {
    background: var(--tl-blue);
    border-color: rgba(96,165,250,.55);
    transform: translateY(-2px);
}

.product-page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 112px 80px 100px;
}

.product-content {
    position: relative;
    z-index: 2;
    max-width: 1250px;
    margin: 0 auto;
}

.product-content h1 {
    text-align: center;
    font-size: clamp(44px, 5vw, 72px);
    margin-bottom: 16px;
    color: #ffffff;
    letter-spacing: 2.5px;
    line-height: .95;
    text-shadow: 0 18px 42px rgba(0,0,0,.25);
}

.product-subtitle {
    max-width: 760px;
    margin: 0 auto 52px;
    text-align: center;
    font-size: clamp(15px, 1.2vw, 18px);
    line-height: 1.8;
    color: rgba(255,255,255,.76);
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
}

.product-card {
    position: relative;
    overflow: hidden;
    min-height: 360px;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.045));
    box-shadow: 0 22px 55px rgba(0,0,0,.28);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    cursor: pointer;
    transition: transform .38s ease, border-color .38s ease, box-shadow .38s ease;
}

.product-card::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at 55% 22%, rgba(96,165,250,.18), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 42%);
    opacity: .9;
    transition: .38s ease;
}

.product-card:hover {
    transform: translateY(-8px);
    border-color: rgba(96,165,250,.58);
    box-shadow: 0 30px 78px rgba(37,99,235,.24), 0 20px 55px rgba(0,0,0,.34);
}

.product-image {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 215px;
    padding: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: rgba(255,255,255,.04);
    border-bottom: 1px solid rgba(255,255,255,.10);
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 18px 28px rgba(0,0,0,.35));
    transition: transform .55s ease;
}

.product-card:hover .product-image img {
    transform: scale(1.08);
}

.product-card-body {
    position: relative;
    z-index: 2;
    padding: 22px 20px 24px;
    text-align: left;
}

.product-card-body h3 {
    margin-bottom: 10px;
    color: #ffffff;
    font-size: 20px;
    line-height: 1.15;
    font-weight: 900;
}

.product-card-body p {
    color: rgba(255,255,255,.62);
    font-size: 14px;
    line-height: 1.65;
}

.product-modal {
    position: fixed;
    inset: 0;
    z-index: 20000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 30px;
    background: rgba(3, 10, 23, .78);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
}

.product-modal.active {
    display: flex;
}

.product-modal-content {
    position: relative;
    width: min(1050px, 100%);
    max-height: 88vh;
    overflow-y: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 34px;
    padding: 34px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 28px;
    background:
        radial-gradient(circle at 0% 0%, rgba(37,99,235,.12), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
    box-shadow: 0 34px 100px rgba(0,0,0,.46);
}

.product-modal-image {
    min-height: 420px;
    padding: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 22px;
    background: linear-gradient(135deg, #eef4ff, #dce9ff);
}

.product-modal-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.product-modal-info {
    padding: 8px 0;
}

.product-modal-info h2 {
    padding-right: 42px;
    font-size: clamp(28px, 3vw, 40px);
    color: var(--tl-navy);
    margin-bottom: 14px;
    line-height: 1.05;
}

.product-modal-info p {
    font-size: 16px;
    line-height: 1.8;
    color: #4b5875;
    margin-bottom: 18px;
}

.detail-list {
    list-style: none;
    margin-top: 18px;
}

.detail-list li {
    padding: 13px 0;
    border-bottom: 1px solid rgba(20,70,150,0.14);
    font-size: 15px;
    line-height: 1.5;
    color: #1f2a44;
}

.detail-list strong {
    color: var(--tl-blue);
}

.product-modal-close {
    position: absolute;
    top: 18px;
    right: 20px;
    width: 42px;
    height: 42px;
    border: none;
    border-radius: 50%;
    background: var(--tl-navy);
    color: #ffffff;
    font-size: 26px;
    cursor: pointer;
    transition: .3s ease;
}

.product-modal-close:hover {
    background: var(--tl-blue);
    transform: rotate(90deg);
}

@media (max-width: 1200px) {
    .product-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .product-page {
        padding: 95px 24px 80px;
    }

    .back-btn {
        top: 18px;
        left: 18px;
        padding: 10px 18px;
        font-size: 13px;
    }

    .product-content h1 {
        font-size: 40px;
    }

    .product-subtitle {
        font-size: 16px;
        margin-bottom: 34px;
    }

    .product-grid {
        grid-template-columns: 1fr;
        gap: 22px;
    }

    .product-card {
        min-height: 320px;
    }

    .product-image {
        height: 210px;
    }

    .product-modal {
        padding: 16px;
    }

    .product-modal-content {
        grid-template-columns: 1fr;
        padding: 24px;
        max-height: 90vh;
        gap: 24px;
    }

    .product-modal-image {
        min-height: 260px;
        padding: 22px;
    }

    .product-modal-info h2 {
        font-size: 26px;
    }
}
</style>
</head>

<body>

<a href="index.html#page2down" class="back-btn">← Back</a>

<section class="product-page">
    <div class="product-content">
        <h1 id="categoryTitle">PRODUCTS</h1>
        <p class="product-subtitle" id="categorySubtitle">
            Select a product to view larger image and detailed specifications.
        </p>

        <div class="product-grid" id="productGrid"></div>
    </div>
</section>

<div class="product-modal" id="productModal">
    <div class="product-modal-content">
        <button class="product-modal-close" id="productModalClose">×</button>

        <div class="product-modal-image">
            <img id="modalImage" src="" alt="">
        </div>

        <div class="product-modal-info">
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>

            <ul class="detail-list">
                <li><strong>Category:</strong> <span id="modalCategory"></span></li>
                <li><strong>Material:</strong> <span id="modalMaterial"></span></li>
                <li><strong>Standard:</strong> <span id="modalStandard"></span></li>
                <li><strong>Size Range:</strong> <span id="modalSize"></span></li>
                <li><strong>Application:</strong> <span id="modalApplication"></span></li>
            </ul>
        </div>
    </div>
</div>

<script>
const productData = {
    lock: {
        title: "LOCK NUTS",
        subtitle: "Lock nut products designed for vibration resistance and reliable fastening performance.",
        products: [
            {
                name: "Nylon Insert Lock Nut",
                image: "nylon-insert-lock-nuts.png",
                short: "Lock nut with nylon insert for vibration resistance.",
                description: "A nylon insert lock nut designed to prevent loosening under vibration and repeated mechanical movement.",
                category: "Lock Nuts",
                material: "Carbon Steel / Stainless Steel",
                standard: "DIN / ISO / Customer Drawing",
                size: "M5 - M24",
                application: "Automotive, machinery, industrial assembly"
            },
            {
                name: "All Metal Lock Nut",
                image: "nut1.png",
                short: "High-strength locking performance without nylon insert.",
                description: "All metal lock nut suitable for high-temperature or heavy-duty applications where nylon inserts are not preferred.",
                category: "Lock Nuts",
                material: "Carbon Steel / Alloy Steel",
                standard: "DIN / ISO / OEM Specification",
                size: "M6 - M30",
                application: "Automotive, heavy equipment, machinery"
            }
        ]
    },

    flange: {
        title: "FLANGE NUTS",
        subtitle: "Flange nut products for wider load distribution and stable assembly.",
        products: [
            {
                name: "Hex Flange Nut",
                image: "product (294).JPG",
                short: "Integrated flange for wider load distribution.",
                description: "Hex flange nut with an integrated washer-like base to distribute load and support stable fastening.",
                category: "Flange Nuts",
                material: "Carbon Steel / Stainless Steel",
                standard: "DIN / ISO / JIS",
                size: "M5 - M20",
                application: "Automotive parts, metal assembly, machinery"
            },
            {
                name: "Serrated Flange Nut",
                image: "product-2.png",
                short: "Serrated base for improved anti-loosening performance.",
                description: "Serrated flange nut designed to improve grip and reduce loosening during vibration.",
                category: "Flange Nuts",
                material: "Carbon Steel",
                standard: "DIN / ISO / OEM Specification",
                size: "M6 - M16",
                application: "Automotive and industrial fastening"
            }
        ]
    },

    weld: {
        title: "WELD NUTS",
        subtitle: "Weld nut products for sheet metal and industrial assembly applications.",
        products: [
            {
                name: "Square Weld Nut",
                image: "nut.png",
                short: "Weld nut for sheet metal assembly.",
                description: "Square weld nut designed for welding onto sheet metal components for strong threaded fastening points.",
                category: "Weld Nuts",
                material: "Carbon Steel",
                standard: "DIN / JIS / Customer Drawing",
                size: "M5 - M12",
                application: "Automotive body parts, sheet metal, brackets"
            },
            {
                name: "Round Weld Nut",
                image: "nut1.png",
                short: "Round type weld nut for industrial applications.",
                description: "Round weld nut suitable for welding processes and stable threaded assembly.",
                category: "Weld Nuts",
                material: "Carbon Steel",
                standard: "Customer Drawing / OEM",
                size: "M5 - M16",
                application: "Automotive, appliance, industrial assembly"
            }
        ]
    },

    special: {
        title: "SPECIAL NUTS",
        subtitle: "Customized fastener solutions based on customer drawings and OEM requirements.",
        products: [
            {
                name: "OEM Special Nut",
                image: "nuts_transparent.png",
                short: "Custom nut based on customer drawings.",
                description: "Special nut manufactured according to customer drawings, material requirements, surface treatment, and application conditions.",
                category: "Special Nuts",
                material: "Carbon Steel / Alloy Steel / Stainless Steel",
                standard: "Customer Drawing",
                size: "Customized",
                application: "OEM, automotive, industrial special parts"
            },
            {
                name: "Custom Fastener Part",
                image: "nut1.png",
                short: "Customized fastener solution for special requirements.",
                description: "Custom fastener part developed for specific industrial needs with controlled production and inspection process.",
                category: "Special Nuts",
                material: "According to specification",
                standard: "OEM Specification",
                size: "Customized",
                application: "Special industrial and automotive applications"
            }
        ]
    }
};

const params = new URLSearchParams(window.location.search);
const selectedCategory = params.get("cat") || "all";

const categoryTitle = document.getElementById("categoryTitle");
const categorySubtitle = document.getElementById("categorySubtitle");
const productGrid = document.getElementById("productGrid");

const productModal = document.getElementById("productModal");
const productModalClose = document.getElementById("productModalClose");

const modalImage = document.getElementById("modalImage");
const modalTitle = document.getElementById("modalTitle");
const modalDescription = document.getElementById("modalDescription");
const modalCategory = document.getElementById("modalCategory");
const modalMaterial = document.getElementById("modalMaterial");
const modalStandard = document.getElementById("modalStandard");
const modalSize = document.getElementById("modalSize");
const modalApplication = document.getElementById("modalApplication");

function getProductsByCategory(categoryKey) {
    if (categoryKey === "all") {
        return {
            title: "ALL PRODUCTS",
            subtitle: "Browse all fastener product categories for automotive, industrial, and OEM applications.",
            products: Object.values(productData).flatMap(category => category.products)
        };
    }

    return productData[categoryKey] || productData.lock;
}

function renderProducts() {
    const category = getProductsByCategory(selectedCategory);

    document.title = `${category.title} - THAI LOCK`;
    categoryTitle.textContent = category.title;
    categorySubtitle.textContent = category.subtitle;
    productGrid.innerHTML = "";

    category.products.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";

        card.innerHTML = `
            <div class="product-image">
                <img src="${product.image}" alt="${product.name}">
            </div>
            <div class="product-card-body">
                <h3>${product.name}</h3>
                <p>${product.short}</p>
            </div>
        `;

        card.addEventListener("click", () => openProductModal(product));
        productGrid.appendChild(card);
    });
}

function openProductModal(product) {
    modalImage.src = product.image;
    modalImage.alt = product.name;

    modalTitle.textContent = product.name;
    modalDescription.textContent = product.description;
    modalCategory.textContent = product.category;
    modalMaterial.textContent = product.material;
    modalStandard.textContent = product.standard;
    modalSize.textContent = product.size;
    modalApplication.textContent = product.application;

    productModal.classList.add("active");
    document.body.style.overflow = "hidden";
}

function closeProductModal() {
    productModal.classList.remove("active");
    document.body.style.overflow = "";
}

productModalClose.addEventListener("click", closeProductModal);

productModal.addEventListener("click", event => {
    if (event.target === productModal) closeProductModal();
});

document.addEventListener("keydown", event => {
    if (event.key === "Escape") closeProductModal();
});

renderProducts();
</script>

</body>
</html>
