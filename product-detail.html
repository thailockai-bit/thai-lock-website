<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.container{
    width:90%;
    max-width:1400px;
    margin:60px auto;
    display:flex;
    gap:60px;
}

.thumbnail-column{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.thumbnail{
    width:90px;
    height:90px;
    border:1px solid #ddd;
    background:white;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
}

.thumbnail img{
    max-width:80%;
    max-height:80%;
}

.thumbnail.active{
    border:2px solid #d71920;
}

.main-image{
    width:700px;
    height:700px;
    background:#efefef;
    display:flex;
    justify-content:center;
    align-items:center;
}

.main-image img{
    max-width:70%;
    max-height:70%;
}

.product-info{
    flex:1;
}

.product-info h1{
    font-size:60px;
    margin-bottom:40px;
}

.product-info h2{
    color:#d71920;
    margin-top:35px;
    margin-bottom:15px;
}

.product-info ul{
    padding-left:25px;
    line-height:1.8;
    font-size:24px;
}

.back-btn{
    position:fixed;
    top:30px;
    left:30px;
    background:#0b58d8;
    color:white;
    text-decoration:none;
    padding:12px 24px;
    border-radius:30px;
    z-index:10;
}

.back-btn:hover{
    background:#002c80;
}

@media(max-width:1000px){
    .container{
        flex-direction:column;
    }

    .thumbnail-column{
        flex-direction:row;
        flex-wrap:wrap;
    }

    .main-image{
        width:100%;
        height:500px;
    }

    .product-info h1{
        font-size:40px;
    }

    .product-info ul{
        font-size:18px;
    }
}
</style>
</head>

<body>

<a href="index.html#page2down" class="back-btn">← Back</a>

<div class="container">

    <div class="thumbnail-column" id="thumbnailColumn"></div>

    <div class="main-image">
        <img src="" id="mainProductImage" alt="Product Image">
    </div>

    <div class="product-info">

        <h1 id="productTitle">Product Name</h1>

        <h2>Competencies</h2>
        <ul id="competenciesList"></ul>

        <h2>Main Properties</h2>
        <ul id="propertiesList"></ul>

        <h2>Applications</h2>
        <ul id="applicationsList"></ul>

    </div>

</div>

<script>
const productData = {
    nut1: {
        title: "Hax Flange Nut",
        images: ["TL 1.png", "nut1.png", "nut1.png", "nut1.png", "nut1.png"],
        competencies: [
            "Knurling obtained by cold extrusion",
            "Internal thread 100% mechanically controlled",
            "Controlled perpendicularity tolerance"
        ],
        properties: [
            "Size: M12 - M16",
            "Property Class 8 - 10",
            "Insert to be pressed into aluminum component"
        ],
        applications: [
            "Braking Calipers",
            "Aluminum Suspension Components"
        ]
    },

    nut2: {
        title: "Nut 2",
        images: ["nut1.png", "nut1.png", "nut1.png", "nut1.png", "nut1.png"],
        competencies: [
            "High precision manufacturing",
            "Strong thread performance",
            "Stable quality control"
        ],
        properties: [
            "Size: M6 - M20",
            "Material: Steel",
            "Surface treatment available"
        ],
        applications: [
            "Automotive parts",
            "Industrial machinery"
        ]
    },

    nut3: {
        title: "Nut 3",
        images: ["nut1.png", "nut1.png", "nut1.png", "nut1.png", "nut1.png"],
        competencies: [
            "OEM production support",
            "Custom fastener design",
            "Reliable mass production"
        ],
        properties: [
            "Size: Custom",
            "Material: Carbon Steel",
            "Standard / OEM specification"
        ],
        applications: [
            "Fastener assembly",
            "Mechanical components"
        ]
    }
};

/* สร้างข้อมูล nut4 - nut20 อัตโนมัติ */
for (let i = 4; i <= 20; i++) {
    productData["nut" + i] = {
        title: "Nut " + i,
        images: ["nut1.png", "nut1.png", "nut1.png", "nut1.png", "nut1.png"],
        competencies: [
            "High quality production",
            "Stable dimensional control",
            "OEM fastener support"
        ],
        properties: [
            "Size: Custom",
            "Material: Steel",
            "Available for industrial use"
        ],
        applications: [
            "Automotive industry",
            "General industrial assembly"
        ]
    };
}

const params = new URLSearchParams(window.location.search);
const productKey = params.get("product") || "nut1";
const product = productData[productKey] || productData.nut1;

document.title = product.title + " - THAI LOCK";
document.getElementById("productTitle").innerText = product.title;

const mainImage = document.getElementById("mainProductImage");
const thumbnailColumn = document.getElementById("thumbnailColumn");

mainImage.src = product.images[0];

product.images.forEach((image, index) => {
    const thumb = document.createElement("div");
    thumb.className = "thumbnail";

    if(index === 0){
        thumb.classList.add("active");
    }

    thumb.innerHTML = `<img src="${image}" alt="${product.title}">`;

    thumb.addEventListener("click", () => {
        mainImage.src = image;

        document.querySelectorAll(".thumbnail").forEach(item => {
            item.classList.remove("active");
        });

        thumb.classList.add("active");
    });

    thumbnailColumn.appendChild(thumb);
});

function renderList(id, items){
    const ul = document.getElementById(id);
    ul.innerHTML = "";

    items.forEach(item => {
        const li = document.createElement("li");
        li.innerText = item;
        ul.appendChild(li);
    });
}

renderList("competenciesList", product.competencies);
renderList("propertiesList", product.properties);
renderList("applicationsList", product.applications);
</script>

</body>
</html>
